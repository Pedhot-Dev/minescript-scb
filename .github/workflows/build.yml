name: Build Minescript (Fabric Only)

on:
  push:
    branches: [ "feature-scoreboard" ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      NO_MINESCRIPT_FORGE_BUILD: "1"
      NO_MINESCRIPT_NEOFORGE_BUILD: "1"

    steps:
      # 1. Checkout Minescript
      - name: Checkout Minescript
        uses: actions/checkout@v4

      # 2. Setup Java 21
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      # 3. Cache Gradle
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}

      # 4. Clone Pyjinn
      - name: Clone Pyjinn
        run: git clone https://github.com/maxuser0/pyjinn.git

      # 🔥 5. Checkout ke versi 0.12
      - name: Checkout Pyjinn v0.12
        working-directory: pyjinn
        run: git checkout v0.12

      # 6. Build & publish ke mavenLocal
      - name: Build & Publish Pyjinn
        working-directory: pyjinn
        run: |
          chmod +x gradlew
          ./gradlew interpreter:publishToMavenLocal

      # 7. Permission gradlew Minescript
      - name: Grant execute permission
        run: chmod +x gradlew

      # 8. Build Fabric
      - name: Build Fabric Mod
        run: ./gradlew :fabric:build

      # 9. Upload JAR
      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: minescript-fabric
          path: fabric/build/libs/*.jar
